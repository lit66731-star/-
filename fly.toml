# Fly.io configuration — generated for auto-messenger MCP server
# Run: fly launch (auto-detects this file) then fly deploy

app = "auto-messenger"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
    force_https = true

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  # Health check — FastMCP serves a basic page at /
  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    method = "get"
    path = "/"
    grace_period = "5s"
